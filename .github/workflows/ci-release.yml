# =============================================================================
# CI/CD — Release Pipeline
# =============================================================================
# Triggered when a semver tag (v*.*.*) is pushed.
# Runs the full quality gate, builds release artifacts with obfuscation,
# and prepares for store deployment.
# Sprint 0 task: S0-08c
# =============================================================================

name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FLUTTER_CHANNEL: stable
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Quality Checks (inline — will migrate to workflow_call reuse later)
  # ===========================================================================
  analyze:
    name: "🔍 Release — Analyze"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - run: flutter pub get
      - name: Generate code
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze --fatal-infos

  test:
    name: "🧪 Release — Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - run: flutter pub get
      - name: Generate code
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n
      - run: flutter test --coverage

  # ===========================================================================
  # Build Release Artifacts
  # ===========================================================================
  build-release:
    name: "📦 Build Release Artifacts"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: flutter-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "🏷️ Building version: $TAG"

      - name: Build APK (release + obfuscation)
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/apk \
            --build-name=${{ steps.version.outputs.tag }} \
            2>&1 | tee build-apk.log

      - name: Build App Bundle (release + obfuscation)
        run: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/aab \
            --build-name=${{ steps.version.outputs.tag }} \
            2>&1 | tee build-aab.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.version.outputs.tag }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ steps.version.outputs.tag }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ steps.version.outputs.tag }}
          path: build/debug-info/
          retention-days: 90

  # ===========================================================================
  # Deploy Firebase Backend
  # ===========================================================================
  deploy-firebase:
    name: "🔥 Deploy Firebase Backend"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & build Cloud Functions
        run: cd functions && npm ci && npm run build

      - name: Placeholder — Firebase deploy
        run: |
          echo "ℹ️  Firebase deploy (Functions, Rules, Indexes) will be enabled"
          echo "    once FIREBASE_TOKEN or Workload Identity is configured."
          echo ""
          echo "    Commands that will run:"
          echo "    firebase deploy --only functions"
          echo "    firebase deploy --only firestore:rules"
          echo "    firebase deploy --only firestore:indexes"
          # Uncomment when ready:
          # npm install -g firebase-tools
          # firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}"
          # firebase deploy --only firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}"
          # firebase deploy --only firestore:indexes --token "${{ secrets.FIREBASE_TOKEN }}"

  # ===========================================================================
  # Mobile Deployment (placeholder)
  # ===========================================================================
  deploy-mobile:
    name: "🚀 Deploy to Stores"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - name: Placeholder — Fastlane deployment
        run: |
          echo "ℹ️  Fastlane deployment will be configured in a future sprint."
          echo ""
          echo "    Play Store (AAB):  fastlane android deploy"
          echo "    App Store (IPA):   fastlane ios deploy  (requires macOS runner)"

  # ===========================================================================
  # Release Summary
  # ===========================================================================
  release-summary:
    name: "📋 Release Summary"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-release, deploy-firebase]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### 🚀 Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Release | ${{ needs.build-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy Firebase | ${{ needs.deploy-firebase.result }} |" >> "$GITHUB_STEP_SUMMARY"
